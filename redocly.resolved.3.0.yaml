      summary: Retrieve 'Report and Pay Capital Gains Tax on Residential Property' Overrides (PPD) [test only]
      description: |
        This endpoint enables you to retrieve the residential property disposals subject to capital gains tax for payment for property disposal (PPD).
        This includes:

        - Disposals previously reported via the HMRC 'Report and Pay Capital Gains Tax on UK Property'
        - User submitted disposal overrides


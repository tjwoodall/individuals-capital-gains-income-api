    put:
      security:
        - User-Restricted:
            - write:self-assessment
      summary: Create and Amend 'Report and Pay Capital Gains Tax on Residential Property' Overrides (PPD) [test only]
      description: |
        This endpoint enables you to override residential property disposal submissions previously submitted via HMRC
        for payment for property disposal (PPD) (using the 'Report and pay Capital Gains Tax on UK property' service) for
        a given National Insurance number and tax year.
        This endpoint can only be used after the tax year has ended. 

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                    |
        |----------------------------------|-------------------------------------------------------------------------------------------------------------|
        | N/A - DEFAULT                    | Simulates success response.                                                                                 |
        | NOT_FOUND                        | Simulates the scenario where no disposals were found to override.                                           |
        | PPD_SUBMISSION_ID_NOT_FOUND      | Simulates the scenario where a ppdSubmissionId used in the submission was not found.                        |
        | INCORRECT_DISPOSAL_TYPE          | Simulate the scenario where a ppdSubmissionId in the request is being used for the incorrect disposal type. |
        | DUPLICATED_PPD_SUBMISSION_ID     | Simulates the scenario where a ppdSubmissionId is duplicated.                                               |
        | TAX_YEAR_NOT_ENDED               | Simulates the scenario where the tax year provided has not ended.                                           |  
        | OUTSIDE_AMENDMENT_WINDOW         | Simulates the scenario where request cannot be completed as it is outside the amendment window.             |
        | STATEFUL                         | Performs a stateful create or update.                                                                       |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors. |
      tags:
        - Capital Gains on Residential Property Disposals
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: *ref_4
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: *ref_22
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: *ref_18
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_6
          required: false

openapi: 3.0.3
info:
  version: '3.0'
  title: Individuals Capital Gains Income (MTD) [test only]
  description: |

    The following groups of endpoints are stateful in the Sandbox:

      - [Capital Gains on Residential Property Disposals](#tag/Capital-Gains-on-Residential-Property-Disposals)
      - [Other Capital Gains and Disposals](#tag/Other-Capital-Gains-and-Disposals)

    # Send fraud prevention data
    HMRC monitors transactions to help protect your customers' confidential data from criminals and fraudsters. 

    <div class="govuk-warning-text warning-icon-fix">
      <span class="govuk-warning-text__icon warning-icon-ui-fix" aria-hidden="true">!</span>
      <strong class="govuk-warning-text__text">
        <span class="govuk-warning-text__assistive">Warning</span>
        You are required by law to submit header data for this API. This includes all associated APIs and endpoints.
      </strong>
    </div>

    [Check the data you need to send](/guides/fraud-prevention/). You can also use the [Test API](/api-documentation/docs/api/service/txm-fph-validator-api/1.0) during initial development and as part of your quality assurance checks.

    # Mapping APIs to Self Assessment tax return forms
    Some parameters in this API map to box numbers in one or more Self Assessment tax return forms. To learn more and to download this mapping information as a CSV file, go to [income-tax-mtd-changelog/mapping](https://github.com/hmrc/income-tax-mtd-changelog?tab=readme-ov-file#mapping-apis-to-self-assessment-tax-return-forms) on GitHub.

    # Changelog
    You can find the changelog in the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/#readme) on GitHub.

    # Support

    * Direct reports of bugs or errors in Production or Sandbox code, or queries about HMRC business functionality (such as how a specific field is used by HMRC or why it is needed) to the [Software Development Support Team (SDST)](https://developer.service.hmrc.gov.uk/developer/support).
    * Send queries or feedback related to the design of the APIs (including recommended changes) using the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/issues) GitHub page.  
    * <a href="/contact/report-technical-problem?newTab=true&service=api-documentation-frontend" target="_blank">Is this page not working properly? (opens in new tab)</a>
servers:
  - url: https://test-api.service.hmrc.gov.uk
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk
    description: Production
tags:
  - name: Capital Gains on Residential Property Disposals
    description: |
      These endpoints allow a user to create, delete or amend Capitals Gains income from residential property disposals

      Resources relating to an individual's residential property disposals
  - name: Other Capital Gains and Disposals
    description: |
      These endpoints allow a user to create, delete or amend income from other Capital Gains and disposals

      Resources relating to an individual's other capital gains and disposals
paths:
  /individuals/disposals-income/residential-property/{nino}/{taxYear}:
    get:
      security:
        - User-Restricted:
            - read:self-assessment
      summary: Retrieve CGT Residential Property Disposals (non-PPD) [test only]
      description: |
        This endpoint enables you to retrieve the residential property disposals subject to capital gains tax for non payment
        for property disposal (non-PPD). This includes user submitted residential property disposals.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                                     |
        |----------------------------------|------------------------------------------------------------------------------------------------------------------------------|                                                                                                                 
        | N/A - DEFAULT                    | Simulates success response.                                                                                                  |
        | LOSS                             | Simulates success loss response.                                                                                             |
        | NOT_FOUND                        | Simulates the scenario where no data is found.                                                                               | 
        | STATEFUL                         | Performs a stateful retrieve.                                                                                                |  
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors. |
      tags:
        - Capital Gains on Residential Property Disposals
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: &ref_3
            type: string
            example: TC663795B
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: &ref_4
            type: string
            example: 2021-22
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: &ref_5
            type: string
            enum:
              - application/vnd.hmrc.3.0+json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: &ref_21
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: &ref_6
            type: string
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: &ref_0
                type: string
                example: c75f40a6-a3df-4429-a697-471eeec46435
              required: true
          content:
            application/json:
              schema:
                oneOf:
                  - $schema: http://json-schema.org/draft-04/schema#
                    title: TY 2024-25 or before
                    type: object
                    properties:
                      customerAddedDisposals:
                        type: object
                        description: Residential property disposals that weren't reported via the 'Report and pay Capital Gains Tax on UK property' service and submitted by the customer into ITSA.
                        properties:
                          submittedOn:
                            description: The date the residential property disposals were submitted, in the format `YYYY-MM-DDThh:mm:ss.SSSZ`
                            type: string
                            format: date-time
                            example: '2020-07-07T10:59:47.544Z'
                          disposals:
                            type: array
                            description: An array of residential property disposals.
                            items:
                              type: object
                              properties: &ref_7
                                customerReference:
                                  type: string
                                  description: The unique reference for a residential property disposal supplied by the customer.
                                  example: CGTDISPOSAL01
                                  pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                                disposalDate:
                                  type: string
                                  description: The date that contracts were exchanged between the owner and the recipient in the format `YYYY-MM-DD`. The date must fall within the specified taxYear.
                                  format: date
                                  example: '2022-02-04'
                                completionDate:
                                  type: string
                                  description: The completion date of the sale or disposal of the property, in the format `YYYY-MM-DD`. The completion date must be within the specific tax year and not in the future. If the specified tax year has not ended, the completion date must be between 7th March and 5th April.
                                  format: date
                                  example: '2022-03-08'
                                disposalProceeds:
                                  type: number
                                  description: The total disposal proceeds from the sale of the residential property. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                acquisitionDate:
                                  type: string
                                  description: The date the disposed property was acquired, in the format `YYYY-MM-DD`.
                                  format: date
                                  example: '2018-04-06'
                                acquisitionAmount:
                                  type: number
                                  description: The total amount paid to acquire the property. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                improvementCosts:
                                  type: number
                                  description: The total costs to improve the property. Only relates to costs that added value to the property. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                additionalCosts:
                                  type: number
                                  description: The total amount of additional costs when the property was acquired (Acquisition Fees) or disposed of (Disposal Fees). It may include fees for surveyors, estate agents and solicitors. If the costs were shared, enter only the amount of that particular owner's share. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 5000.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                prfAmount:
                                  type: number
                                  description: The total amount of Private Residence Relief claimed. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                otherReliefAmount:
                                  type: number
                                  description: The total amount of other reliefs claimed. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                lossesFromThisYear:
                                  type: number
                                  description: The amount of Capital Gains Tax losses from other disposals in the current tax year that reduce the overall gain of this disposal. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                lossesFromPreviousYear:
                                  type: number
                                  description: The amount of Capital Gains Tax losses from disposals in previous tax years that reduce the overall gain of this disposal. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                amountOfNetGain:
                                  type: number
                                  description: The total amount of net gain from the disposal. Either gain or loss must be populated but not both. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                amountOfNetLoss:
                                  type: number
                                  description: The total amount of net loss from the disposal. Either gain or loss must be populated but not both. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                              required: &ref_8
                                - disposalDate
                                - completionDate
                                - disposalProceeds
                                - acquisitionDate
                                - acquisitionAmount
                        required:
                          - submittedOn
                          - disposals
                        additionalProperties: false
                    required:
                      - customerAddedDisposals
                    additionalProperties: false
                  - $schema: http://json-schema.org/draft-04/schema#
                    title: TY 2025-26 onwards
                    type: object
                    properties:
                      customerAddedDisposals:
                        type: object
                        description: Residential property disposals that weren't reported via the 'Report and pay Capital Gains Tax on UK property' service and submitted by the customer into ITSA.
                        properties:
                          submittedOn:
                            description: The date the residential property disposals were submitted, in the format `YYYY-MM-DDThh:mm:ss.SSSZ`
                            type: string
                            format: date-time
                            example: '2020-07-07T10:59:47.544Z'
                          disposals:
                            type: array
                            description: An array of residential property disposals.
                            items:
                              type: object
                              properties: &ref_9
                                numberOfDisposals:
                                  type: integer
                                  description: The total number of property disposals submitted. The value must be an integer between 1 and 9999.
                                  example: 199
                                  multipleOf: 1
                                  minimum: 1
                                  maximum: 9999
                                customerReference:
                                  type: string
                                  description: The unique reference for a residential property disposal supplied by the customer.
                                  example: CGTDISPOSAL01
                                  pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                                disposalDate:
                                  type: string
                                  description: The date that contracts were exchanged between the owner and the recipient in the format `YYYY-MM-DD`. The date must fall within the specified taxYear.
                                  format: date
                                  example: '2022-02-04'
                                completionDate:
                                  type: string
                                  description: The completion date of the sale or disposal of the property, in the format `YYYY-MM-DD`. The completion date must be within the specific tax year and not in the future. If the specified tax year has not ended, the completion date must be between 7th March and 5th April.
                                  format: date
                                  example: '2022-03-08'
                                disposalProceeds:
                                  type: number
                                  description: The total disposal proceeds from the sale of the residential property. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                acquisitionDate:
                                  type: string
                                  description: The date the disposed property was acquired, in the format `YYYY-MM-DD`.
                                  format: date
                                  example: '2018-04-06'
                                acquisitionAmount:
                                  type: number
                                  description: The total amount paid to acquire the property. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                improvementCosts:
                                  type: number
                                  description: The total costs to improve the property. Only relates to costs that added value to the property. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                additionalCosts:
                                  type: number
                                  description: The total amount of additional costs when the property was acquired (Acquisition Fees) or disposed of (Disposal Fees). It may include fees for surveyors, estate agents and solicitors. If the costs were shared, enter only the amount of that particular owner's share. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 5000.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                prfAmount:
                                  type: number
                                  description: The total amount of Private Residence Relief claimed. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                otherReliefAmount:
                                  type: number
                                  description: The total amount of other reliefs claimed. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                gainsWithBadr:
                                  type: number
                                  description: The total amount of gains eligible for Business Asset Disposal Relief (BADR) before losses have been deducted. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                gainsBeforeLosses:
                                  type: number
                                  description: The total amount of gains before losses have been deducted. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                lossesFromThisYear:
                                  type: number
                                  description: The amount of Capital Gains Tax losses from other disposals in the current tax year that reduce the overall gain of this disposal. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                claimOrElectionCodes:
                                  type: array
                                  description: |-
                                    The claim, election or notice codes related to the disposal.

                                    Possible values are: 

                                    * **PRR**: Private Residence Relief where Letting Relief does not apply 

                                    * **LET**: Private Residence Relief where Letting Relief applies

                                    * **GHO**: Gift Hold-Over Relief

                                    * **ROR**: Rollover Relief 

                                    * **PRO**: Provisional Rollover Relief

                                    * **BAD**: Business Asset Disposal Relief 

                                    * **NVC**: Negligible Value Claims

                                    * **OTH**: Other claims
                                  items:
                                    type: string
                                    example: '["BAD","OTH"]'
                                    enum:
                                      - PRR
                                      - LET
                                      - GHO
                                      - ROR
                                      - PRO
                                      - BAD
                                      - NVC
                                      - OTH
                                amountOfNetGain:
                                  type: number
                                  description: The total amount of net gain from the disposal. Either gain or loss must be populated but not both. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                                amountOfNetLoss:
                                  type: number
                                  description: The total amount of net loss from the disposal. Either gain or loss must be populated but not both. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                                  example: 1999.99
                                  multipleOf: 0.01
                                  minimum: 0
                                  maximum: 99999999999.99
                              required: &ref_10
                                - numberOfDisposals
                                - disposalDate
                                - completionDate
                                - disposalProceeds
                                - acquisitionDate
                                - acquisitionAmount
                                - gainsBeforeLosses
                        required:
                          - submittedOn
                          - disposals
                    required:
                      - customerAddedDisposals
                    additionalProperties: false
              examples:
                TY 2024-25 or before:
                  value:
                    customerAddedDisposals:
                      submittedOn: '2020-08-07T10:59:47.544Z'
                      disposals:
                        - customerReference: CGTDISPOSAL01
                          disposalDate: '2020-05-04'
                          completionDate: '2020-05-08'
                          disposalProceeds: 1999.99
                          acquisitionDate: '2018-04-06'
                          acquisitionAmount: 1999.99
                          improvementCosts: 1999.99
                          additionalCosts: 5000.99
                          prfAmount: 1999.99
                          otherReliefAmount: 1999.99
                          lossesFromThisYear: 1999.99
                          lossesFromPreviousYear: 1999.99
                          amountOfNetGain: 1999.99
                TY 2025-26 onwards:
                  value:
                    customerAddedDisposals:
                      submittedOn: '2020-08-07T10:59:47.544Z'
                      disposals:
                        - numberOfDisposals: 3
                          customerReference: CGTDISPOSAL01
                          disposalDate: '2020-05-04'
                          completionDate: '2020-05-08'
                          disposalProceeds: 1999.99
                          acquisitionDate: '2018-04-06'
                          acquisitionAmount: 1999.99
                          improvementCosts: 1999.99
                          additionalCosts: 5000.99
                          prfAmount: 1999.99
                          otherReliefAmount: 1999.99
                          gainsWithBadr: 1999.99
                          gainsBeforeLosses: 1999.99
                          lossesFromThisYear: 1999.99
                          claimOrElectionCodes:
                            - GHO
                            - BAD
                          amountOfNetGain: 1999.99
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: &ref_1
                  code:
                    description: The error code
                    type: string
                  message:
                    description: The error message
                    type: string
                required: &ref_2
                  - code
              examples:
                FORMAT_NINO:
                  description: The format of the supplied NINO field is not valid.
                  value: &ref_11
                    code: FORMAT_NINO
                    message: The provided NINO is invalid
                FORMAT_TAX_YEAR:
                  description: The format of the supplied tax year field is not valid.
                  value: &ref_12
                    code: FORMAT_TAX_YEAR
                    message: The provided tax year is invalid
                RULE_TAX_YEAR_NOT_SUPPORTED:
                  description: The specified tax year is not supported. Either the tax year specified is before the minimum tax year value, or it is after the maximum tax year value.
                  value: &ref_13
                    code: RULE_TAX_YEAR_NOT_SUPPORTED
                    message: The tax year specified does not lie within the supported range
                RULE_TAX_YEAR_RANGE_INVALID:
                  description: Tax year range invalid. A tax year range of one year is required
                  value: &ref_14
                    code: RULE_TAX_YEAR_RANGE_INVALID
                    message: Tax year range invalid. A tax year range of one year is required
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for this endpoint version. This error will only be returned in the Sandbox environment.
                  value: &ref_15
                    code: RULE_INCORRECT_GOV_TEST_SCENARIO
                    message: The supplied Gov-Test-Scenario is not valid
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client or agent is not authorised. This is because: the client is not subscribed to MTD, 
                    the agent is not subscribed to Agent Services, or the client has not authorised the agent to act on their behalf.
                  value: &ref_16
                    code: CLIENT_OR_AGENT_NOT_AUTHORISED
                    message: The client and/or agent is not authorised
        '404':
          description: Not Found
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                MATCHING_RESOURCE_NOT_FOUND:
                  description: The supplied income source could not be found.
                  value: &ref_20
                    code: MATCHING_RESOURCE_NOT_FOUND
                    message: Matching resource not found
        '422':
          description: Unprocessable Entity
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                RULE_REQUEST_CANNOT_BE_FULFILLED:
                  description: The request cannot be fulfilled. More specific information is provided in the error message.
                  value: &ref_17
                    code: RULE_REQUEST_CANNOT_BE_FULFILLED
                    message: Custom (will vary in production depending on the actual error)
    put:
      security:
        - User-Restricted:
            - write:self-assessment
      summary: Create and Amend CGT Residential Property Disposals (non-PPD) [test only]
      description: |

        This endpoint enables you to submit residential property disposals that are not reported via the 'Report and pay Capital Gains Tax on UK property' service
        (not payment for property disposal) for a given National Insurance number and tax year.

        The disposal date must be within the specified tax year.
        The completion date must be within the specified tax year and not in the future.
        If the specified tax year has not ended, the completion date must be between 7th March and 5th April.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario)     | Scenario                                                                          |
        |--------------------------------------|-----------------------------------------------------------------------------------|
        | N/A - DEFAULT                        | Simulates success response.                                                       |
        | ACQUISITION_DATE_AFTER_DISPOSAL_DATE | Simulates a scenario where acquisitionDate is later than disposalDate.            |
        | INVALID_COMPLETION_DATE              | Simulates a scenario where the completionDate is not within the specific tax year or in the future. If the specified tax year has not ended, the completionDate must be between 7th March and 5th April. |
        | INVALID_DISPOSAL_DATE                | Simulates a scenario where the disposalDate is not within the specified tax year. |  
        | OUTSIDE_AMENDMENT_WINDOW             | Simulates the scenario where request cannot be completed as it is outside the amendment window.          |
        | STATEFUL                             | Performs a stateful create or update.                                             |
        | REQUEST_CANNOT_BE_FULFILLED          | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors. |
      tags:
        - Capital Gains on Residential Property Disposals
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: *ref_4
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: &ref_22
            type: string
            enum:
              - application/json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: &ref_18
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_6
          required: false
      requestBody:
        content:
          application/json:
            schema:
              oneOf:

    put:
      summary: Create and Amend Other Capital Gains and Disposals
      security:
        - User-Restricted:
            - write:self-assessment
      description: |
        This endpoint allows you to submit other Capital Gains and disposals with the exception of residential property, 
        for a given National Insurance number and tax year.

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                                                                                 |
        |----------------------------------|----------------------------------------------------------------------------------------------------------|
        | N/A - DEFAULT                    | Simulates success response with gains.                                                                   |
        | INVALID_DISPOSAL_DATE            | Simulates a scenario where disposalDate is not within the specified tax year or later than today's date. |
        | INVALID_ACQUISITION_DATE         | Simulates a scenario where acquisitionDate is later than disposalDate.                                   |   
        | STATEFUL                         | Performs a stateful create or update.                                                                    |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors. |
      tags:
        - Other Capital Gains and Disposals
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: *ref_4
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Content-Type
          in: header
          description: |
            Specifies the format of the request body, which must be JSON.
          schema: *ref_17
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *write:self-assessment* scope.
          schema: *ref_15
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_6
          required: false
      requestBody:
        content:
          application/json:
            schema:
              $schema: http://json-schema.org/draft-04/schema#
              title: Create and Amend Other Capital Gains and Disposals Request
              description: Create and Amend Other Capital Gains and Disposals Request
              type: object
              properties:
                disposals:
                  type: array
                  description: An array of other Capital Gains disposals.
                  items: *ref_23
                nonStandardGains:
                  type: object
                  description: 'One of these fields must be provided: carriedInterestGain, attributedGains or otherGains'
                  properties: *ref_24
                losses:
                  type: object
                  description: 'Details Capital Gains Tax losses relating to other disposals and non-standard gains. One of these fields must be provided: broughtForwardLossesUsedInCurrentYear, setAgainstInYearGains, setAgainstInYearGeneralIncome or setAgainstEarlierYear'
                  properties: *ref_25
                adjustments:
                  type: number
                  description: The amount of included adjustments to reduce or increase the Capital Gains Tax payable. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                  example: '5000.99'
                  multipleOf: 0.01
                  minimum: -99999999999.99
                  maximum: 99999999999.99
            examples:
              example-1:
                description: Other Capital Gains and Disposals with Gains
                value:
                  disposals:
                    - assetType: other-property
                      assetDescription: Property Sale
                      acquisitionDate: '2021-05-01'
                      disposalDate: '2021-06-01'
                      disposalProceeds: 1000.12
                      allowableCosts: 1000.12
                      gain: 1000.12
                      claimOrElectionCodes:
                        - PRR
                      gainAfterRelief: 1000.12
                      rttTaxPaid: 1000.12
                  nonStandardGains:
                    carriedInterestGain: 1000.12
                    carriedInterestRttTaxPaid: 1000.12
                    attributedGains: 1000.12
                    attributedGainsRttTaxPaid: 1000.12
                    otherGains: 1000.12
                    otherGainsRttTaxPaid: 1000.12
                  losses:
                    broughtForwardLossesUsedInCurrentYear: 1000.12
                    setAgainstInYearGains: 1000.12
                    setAgainstInYearGeneralIncome: 1000.12
                    setAgainstEarlierYear: 1000.12
                  adjustments: 1000.12
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
        '400':
          description: Bad request
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                FORMAT_NINO:
                  description: The format of the supplied NINO field is not valid.
                  value: *ref_7
                FORMAT_TAX_YEAR:
                  description: The format of the supplied tax year field is not valid.
                  value: *ref_8
                FORMAT_VALUE:
                  description: One or more values have been added with the incorrect format.
                  value: *ref_18
                FORMAT_DATE:
                  description: The supplied date format is invalid.
                  value: *ref_19
                FORMAT_ASSET_DESCRIPTION:
                  description: The format of the supplied asset description is not valid.
                  value:
                    code: FORMAT_ASSET_DESCRIPTION
                    message: The provided asset description is invalid
                FORMAT_ASSET_TYPE:
                  description: The format of the supplied assetType value is invalid.
                  value:
                    code: FORMAT_ASSET_TYPE
                    message: The format of the assetType value is invalid
                FORMAT_CLAIM_OR_ELECTION_CODES:
                  description: The format of the supplied claimOrElectionCodes value is invalid.
                  value:
                    code: FORMAT_CLAIM_OR_ELECTION_CODES
                    message: The format of the claimOrElectionCodes value is invalid
                RULE_TAX_YEAR_RANGE_INVALID:
                  description: Tax year range invalid. A tax year range of one year is required
                  value: *ref_11
                RULE_TAX_YEAR_NOT_SUPPORTED:
                  description: The specified tax year is not supported. Either the tax year specified is before the minimum tax year value, or it is after the maximum tax year value.
                  value: *ref_9
                RULE_TAX_YEAR_FOR_VERSION_NOT_SUPPORTED:
                  description: This version of the API supports tax years up to, and including, 2024-25. For tax years 2025–26 onwards, a new version is in development.
                  value: *ref_10
                RULE_INCORRECT_OR_EMPTY_BODY_SUBMITTED:
                  description: An empty or non-matching body was submitted.
                  value: *ref_21
                RULE_DISPOSAL_DATE_NOT_FUTURE:
                  description: The disposalDate must be in the specified tax year and no later than today's date.
                  value:
                    code: RULE_DISPOSAL_DATE_FUTURE
                    message: The disposalDate must be in the specified tax year and no later than today's date
                RULE_ACQUISITION_DATE:
                  description: The acquisitionDate must not be later than disposalDate.
                  value:
                    code: RULE_ACQUISITION_DATE
                    message: The acquisitionDate must not be later than disposalDate
                RULE_GAIN_LOSS:
                  description: Only one of gain or loss values can be provided.
                  value:
                    code: RULE_GAIN_LOSS
                    message: Only one of gain or loss values can be provided
                RULE_GAIN_AFTER_RELIEF_LOSS_AFTER_RELIEF:
                  description: Only one of gainAfterRelief or lossAfterRelief values can be provided.
                  value:
                    code: RULE_GAIN_AFTER_RELIEF_LOSS_AFTER_RELIEF
                    message: Only one of gainAfterRelief or lossAfterRelief values can be provided
                RULE_INCORRECT_GOV_TEST_SCENARIO:
                  description: The request did not match any available Sandbox data. Check that the supplied Gov-Test-Scenario is correct for this endpoint version. This error will only be returned in the Sandbox environment.
                  value: *ref_12
        '403':
          description: Forbidden
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                CLIENT_OR_AGENT_NOT_AUTHORISED:
                  description: |
                    The client or agent is not authorised. This is because: the client is not subscribed to MTD, 
                    the agent is not subscribed to Agent Services, or the client has not authorised the agent to act on their behalf.
                  value: *ref_13
        '422':
          description: Unprocessable Entity
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                description: Error Response
                type: object
                properties: *ref_1
                required: *ref_2
              examples:
                RULE_REQUEST_CANNOT_BE_FULFILLED:
                  description: The request cannot be fulfilled. More specific information is provided in the error message.
                  value: *ref_14

    get:
      summary: Retrieve Other Capital Gains and Disposals
      security:
        - User-Restricted:
            - read:self-assessment
      description: |
        This endpoint allows the developer to retrieve other Capital Gains and disposals
        with the exception of residential property, for a given NINO and tax year

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario) | Scenario                                              |
        |----------------------------------|-------------------------------------------------------|
        | N/A - DEFAULT                    | Simulates success response with gains.                |
        | LOSS                             | Simulates success response with loss.                 |
        | NOT_FOUND                        | Simulates the scenario where no disposals were found. |  
        | STATEFUL                         | Performs a stateful retrieve.                         |
        | REQUEST_CANNOT_BE_FULFILLED      | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors. |
      tags:
        - Other Capital Gains and Disposals
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: *ref_3
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: *ref_4
          required: true
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: *ref_5
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: *ref_22
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: *ref_6
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: *ref_0
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Retrieve Other Capital Gains and Disposals Response
                description: Retrieve Other Capital Gains and Disposals Response
                type: object
                properties:
                  submittedOn:
                    type: string
                    description: The date the disposals were submitted to the Report and pay Capital Gains Tax on UK property service. It is in the format YYYY-MM-DDThh:mm:ssZ.
                    example: '2020-07-06T09:37:17Z'
                  disposals:
                    type: array
                    description: An array of other Capital Gains disposals.
                    items: &ref_23
                      type: object
                      properties:
                        assetType:
                          type: string
                          description: The type of asset being disposed of.
                          enum:
                            - other-property
                            - unlisted-shares
                            - listed-shares
                            - other-asset
                        assetDescription:
                          type: string
                          description: A description of the asset being disposed of.
                          example: Shares
                          pattern: ^[0-9a-zA-Z{À-˿’}\- _&`():.'^]{1,90}$
                        acquisitionDate:
                          type: string
                          description: The date the asset was acquired in the format YYYY-MM-DD.
                          example: '2022-03-04'
                        disposalDate:
                          type: string
                          description: The date that the asset was disposed of in the format YYYY-MM-DD.
                          example: '2022-03-04'
                        disposalProceeds:
                          type: number
                          description: The total proceeds from the disposal of the asset. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '5000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                        allowableCosts:
                          type: number
                          description: The total amount of allowable costs that can be deducted from the disposal proceeds. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '5000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                        gain:
                          type: number
                          description: The total gain from the disposal. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '5000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                        loss:
                          type: number
                          description: The total loss from the disposal. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '5000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                        claimOrElectionCodes:
                          type: array
                          description: |-
                            The claim, election or notice codes related to the disposal. Possible values are:\
                            `PRR` - Private Residence Relief where Letting Relief does not apply\
                            `LET` - Private Residence Relief where Letting Relief applies\
                            `GHO` - Gift Hold-Over Relief\
                            `ROR` - Rollover Relief\
                            `PRO` - Provisional Rollover Relief\
                            `ESH` - Employee Shares\
                            `NVC` - Negligible Value Claims\
                            `SIR` - Social Investment Tax Relief\
                            `OTH` - Other claims\
                            `BAD` - Business Asset Disposal Relief\
                            `INV` - Investors' Relief
                          items:
                            type: string
                            example: '["BAD","OTH"]'
                        gainAfterRelief:
                          type: number
                          description: The total net gain after any reliefs have been applied. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '5000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                        lossAfterRelief:
                          type: number
                          description: The total net loss after any reliefs have been applied. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '5000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                        rttTaxPaid:
                          type: number
                          description: The total amount of tax paid through the Capital Gains Tax Real Time Transactions service for this disposal. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                          example: '5000.99'
                          multipleOf: 0.01
                          minimum: 0
                          maximum: 99999999999.99
                      required:
                        - assetType
                        - assetDescription
                        - acquisitionDate
                        - disposalDate
                        - disposalProceeds
                        - allowableCosts
                  nonStandardGains:
                    type: object
                    description: 'One of these fields must be provided: carriedInterestGain, attributedGains or otherGains'
                    properties: &ref_24
                      carriedInterestGain:
                        type: number
                        description: The total amount of all the carried interest gains. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        example: '5000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                      carriedInterestRttTaxPaid:
                        type: number
                        description: The total amount of tax paid through the Capital Gains Tax Real Time Transactions service for all of the carried interest gains. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        example: '5000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                      attributedGains:
                        type: number
                        description: The total amount of all the attributed gains where personal losses cannot be set off. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        example: '5000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                      attributedGainsRttTaxPaid:
                        type: number
                        description: The total amount of tax paid through the Capital Gains Tax Real Time Transactions service for all of the attributed interest gains. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        example: '5000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                      otherGains:
                        type: number
                        description: The total amount of any other asset type gains not reported elsewhere for the specified tax year. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        example: '5000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                      otherGainsRttTaxPaid:
                        type: number
                        description: The total amount of tax paid through the Capital Gains Tax Real Time Transactions service on any other asset-type gains. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        example: '5000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                  losses:
                    type: object
                    description: 'Details Capital Gains Tax losses relating to other disposals and non-standard gains. One of these fields must be provided: broughtForwardLossesUsedInCurrentYear, setAgainstInYearGains, setAgainstInYearGeneralIncome or setAgainstEarlierYear'
                    properties: &ref_25
                      broughtForwardLossesUsedInCurrentYear:
                        type: number
                        description: The total amount of brought forward losses used for the specified tax year. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        example: '5000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                      setAgainstInYearGains:
                        type: number
                        description: The total amount of trading losses set against chargeable gains for the specified tax year. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        example: '5000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                      setAgainstInYearGeneralIncome:
                        type: number
                        description: The total amount of losses set against general income for the specified tax year. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        example: '5000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                      setAgainstEarlierYear:
                        type: number
                        description: The total amount of losses set against general income for the tax year previous to the specified tax year. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        example: '5000.99'
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                  adjustments:
                    type: number
                    description: The amount of included adjustments to reduce or increase the Capital Gains Tax payable. The value must be between -99999999999.99 and 99999999999.99 up to 2 decimal places.
                    example: '5000.99'
                    multipleOf: 0.01
                    minimum: -99999999999.99
                    maximum: 99999999999.99
                required:
                  - submittedOn
              examples:
                example-response:
                  description: Example Response
                  value:
                    submittedOn: '2020-07-06T09:37:17.000Z'
                    disposals:
                      - assetType: other-property
                        assetDescription: Property Sale

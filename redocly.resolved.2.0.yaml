openapi: 3.0.3
info:
  version: '2.0'
  title: Individuals Capital Gains Income (MTD)
  description: |

    The following groups of endpoints are stateful in the Sandbox:

      - [Capital Gains on Residential Property Disposals](#tag/Capital-Gains-on-Residential-Property-Disposals)
      - [Other Capital Gains and Disposals](#tag/Other-Capital-Gains-and-Disposals)

    # Send fraud prevention data
    HMRC monitors transactions to help protect your customers' confidential data from criminals and fraudsters. 

    <div class="govuk-warning-text warning-icon-fix">
      <span class="govuk-warning-text__icon warning-icon-ui-fix" aria-hidden="true">!</span>
      <strong class="govuk-warning-text__text">
        <span class="govuk-warning-text__assistive">Warning</span>
        You are required by law to submit header data for this API. This includes all associated APIs and endpoints.
      </strong>
    </div>

    [Check the data you need to send](/guides/fraud-prevention/). You can also use the [Test API](/api-documentation/docs/api/service/txm-fph-validator-api/1.0) during initial development and as part of your quality assurance checks.

    # Mapping APIs to Self Assessment tax return forms
    Some parameters in this API map to box numbers in one or more Self Assessment tax return forms. To learn more and to download this mapping information as a CSV file, go to [income-tax-mtd-changelog/mapping](https://github.com/hmrc/income-tax-mtd-changelog?tab=readme-ov-file#mapping-apis-to-self-assessment-tax-return-forms) on GitHub.

    # Changelog
    You can find the changelog in the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/#readme) on GitHub.

    # Support

    * Direct reports of bugs or errors in Production or Sandbox code, or queries about HMRC business functionality (such as how a specific field is used by HMRC or why it is needed) to the [Software Development Support Team (SDST)](https://developer.service.hmrc.gov.uk/developer/support).
    * Send queries or feedback related to the design of the APIs (including recommended changes) using the [income-tax-mtd-changelog](https://github.com/hmrc/income-tax-mtd-changelog/issues) GitHub page.  
    * <a href="/contact/report-technical-problem?newTab=true&service=api-documentation-frontend" target="_blank">Is this page not working properly? (opens in new tab)</a>
servers:
  - url: https://test-api.service.hmrc.gov.uk
    description: Sandbox
  - url: https://api.service.hmrc.gov.uk
    description: Production
tags:
  - name: Capital Gains on Residential Property Disposals
    description: |
      These endpoints allow a user to create, delete or amend Capitals Gains income from residential property disposals

      Resources relating to an individual's residential property disposals
  - name: Other Capital Gains and Disposals
    description: |
      These endpoints allow a user to create, delete or amend income from other Capital Gains and disposals

      Resources relating to an individual's other capital gains and disposals
paths:
  /individuals/disposals-income/residential-property/{nino}/{taxYear}:
    get:
      summary: Retrieve All CGT Residential Property Disposals and Overrides
      security:
        - User-Restricted:
            - read:self-assessment
      description: |
        This API provides the capability to retrieve the residential property disposals subject to capital gains tax for 
        payment for property disposal (PPD) and non payment for property disposal (non-PPD).  This includes:

          - User submitted residential property disposals
          - Disposals previously reported via the HMRC 'Report and Pay Capital Gains Tax on UK Property'
          - User submitted disposal overrides

        ### Test data
        Scenario simulation using Gov-Test-Scenario headers is only available in the sandbox environment.

        | Header Value (Gov-Test-Scenario)        | Scenario                                                                                                                                                                                                                                    |
        |-----------------------------------------|---------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------------|                                                                                                                 
        | N/A - DEFAULT<br> **?source=user**      | Requesting **user** source simulates success response with User provided disposals and overrides.                                                                                                                                           |
        | N/A - DEFAULT<br> **?source=hmrc-held** | Requesting **hmrc-held** source simulates success response with HMRC held disposals.                                                                                                                                                        |
        | N/A - DEFAULT<br> **?source=latest**    | Requesting **latest** source simulates success response with Latest disposals and overrides submitted.                                                                                                                                      |
        | LOSS<br> **source=latest**              | Requesting **latest** source with LOSS simulates success response with User provided disposals and overrides with losses.                                                                                                                   |
        | NOT_FOUND                               | Simulates the scenario where no data is found.                                                                                                                                                                                              | 
        | STATEFUL                                | Performs a stateful retrieve. <p> Information and data held by HMRC is not available in the sandbox environment. Providing ‘source=hmrc-held’ will result in the expected HTTP 404 (matching resource not found) error being returned. </p> |  
        | REQUEST_CANNOT_BE_FULFILLED             | Simulates the scenario where the request cannot be fulfilled for various reasons other than the ones triggering other errors.                                                                                                               |
      tags:
        - Capital Gains on Residential Property Disposals
      parameters:
        - name: nino
          in: path
          description: |
            National Insurance number, in the format `AA999999A`
          schema: &ref_3
            type: string
            example: TC663795B
          required: true
        - name: taxYear
          in: path
          description: |
            The tax year the data applies to, for example, 2021-22. 
            The start year and end year must not span two tax years. The minimum tax year is 2021-22. No gaps are allowed, for example, 2020-22 is not valid.
            (The minimum tax year in Sandbox is 2019-20.)
          schema: &ref_4
            type: string
            example: 2021-22
          required: true
        - in: query
          name: source
          description: |
            Specifies the source of data to be returned. If source is not provided,
            the latest submitted values will be returned.
          schema:
            type: string
            enum:
              - user
              - hmrc-held
              - latest
            example: latest
          required: false
        - name: Accept
          in: header
          description: |
            Specifies the response format and the version of the API to be used.
          schema: &ref_5
            type: string
            enum:
              - application/vnd.hmrc.2.0+json
          required: true
        - name: Authorization
          in: header
          description: |
            An OAuth 2.0 Bearer Token with the *read:self-assessment* scope.
          schema: &ref_22
            type: string
            example: Bearer bb7fed3fe10dd235a2ccda3d50fb
          required: true
        - name: Gov-Test-Scenario
          in: header
          description: |
            Only in sandbox environment. See Test Data table for all header values.
          schema: &ref_6
            type: string
          required: false
      responses:
        '200':
          description: Success
          headers:
            X-CorrelationId:
              in: header
              type: string
              description: |
                Unique ID for operation tracking
                String, 36 characters.
              schema: &ref_0
                type: string
                example: c75f40a6-a3df-4429-a697-471eeec46435
              required: true
          content:
            application/json:
              schema:
                $schema: http://json-schema.org/draft-04/schema#
                title: Retrieve All CGT Residential Property Disposals and Overrides Response
                description: Retrieve All CGT Residential Property Disposals and Overrides Response
                type: object
                properties:
                  ppdService:
                    type: object
                    description: An object containing single and multiple property disposal submissions previously reported via the HMRC 'Report and pay Capital Gains Tax on UK property'
                    properties:
                      ppdYearToDate:
                        description: The total amount of Capital Gains charges on the sale of Residential Properties that has been submitted via the Capital Gains Tax UK property account for the year. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                        type: number
                        multipleOf: 0.01
                        minimum: 0
                        maximum: 99999999999.99
                        example: '1999.99'
                      multiplePropertyDisposals:
                        type: array
                        description: An array of the multiple property disposals.
                        minItems: 1
                        items:
                          type: object
                          properties:
                            source:
                              description: Specifies the source of data to be returned.
                              type: string
                              enum:
                                - hmrc-held
                                - user
                            submittedOn:
                              description: The date the disposals were submitted, in the format YYYY-MM-DDThh:mm:ss.SSSZ
                              type: string
                              example: '2020-07-07T10:59:47.544Z'
                            ppdSubmissionId:
                              description: The reference number returned to the customer from the Report and pay Capital Gains Tax on UK property service.
                              type: string
                              example: Da2467289108
                              pattern: ^[A-Za-z0-9]{12}$
                            ppdSubmissionDate:
                              description: The date the disposals were submitted, in the format YYYY-MM-DDThh:mm:ss.SSSZ
                              type: string
                              example: '2020-07-07T10:59:47.544Z'
                            numberOfDisposals:
                              description: The number of properties disposed of within a single Report and pay Capital Gains Tax on UK property service submission. The value must be between 2 and 999
                              type: number
                              minimum: 2
                              maximum: 999
                              multipleOf: 1
                              example: '3'
                            disposalTaxYear:
                              description: The tax year in which the properties were disposed. The 2021-22 tax year would be represented as 2022.
                              type: number
                              example: '2022'
                              pattern: ^2[0-9]{3}$
                            completionDate:
                              description: The completion date of the sale or disposal of the properties, in the format YYYY-MM-DD.
                              type: string
                              example: '2022-03-08'
                            amountOfNetGain:
                              description: The total amount of net gain from the disposals.  Either gain or loss must be populated but not both. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                            amountOfNetLoss:
                              description: The total amount of net loss from the disposals.  Either gain or loss must be populated but not both. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                          required:
                            - source
                            - ppdSubmissionId
                      singlePropertyDisposals:
                        type: array
                        description: An array of the single property disposals.
                        minItems: 1
                        items:
                          type: object
                          properties:
                            source:
                              description: Specifies the source of data to be returned.
                              type: string
                              enum:
                                - hmrc-held
                                - user
                            submittedOn:
                              description: The date the disposals were submitted, in the format YYYY-MM-DDThh:mm:ss.SSSZ
                              type: string
                              example: '2020-07-07T10:59:47.544Z'
                            ppdSubmissionId:
                              description: The reference number returned to the customer from the Report and pay Capital Gains Tax on UK property service.
                              type: string
                              example: Da2467289108
                              pattern: ^[A-Za-z0-9]{12}$
                            ppdSubmissionDate:
                              description: The date the disposal was submitted, in the format YYYY-MM-DDThh:mm:ss.SSSZ
                              type: string
                              example: '2020-07-07T10:59:47.544Z'
                            disposalDate:
                              description: The date that contracts were exchanged between the owner and the recipient in the format YYYY-MM-DD. The date must fall within the specified taxYear.
                              type: string
                              example: '2022-02-04'
                            completionDate:
                              description: The completion date of the sale or disposal of the property, in the format YYYY-MM-DD.
                              type: string
                              example: '2022-03-08'
                            disposalProceeds:
                              description: The total disposal proceeds from the sale of the residential property. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                            acquisitionDate:
                              description: The date the disposed property was acquired in the format YYYY-MM-DD.
                              type: string
                              example: '2018-04-06'
                            acquisitionAmount:
                              description: The total amount paid to acquire the property. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                            improvementCosts:
                              description: The total costs to improve the property. Only relates to costs that added value to the property. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                            additionalCosts:
                              description: The total amount of additional costs when the property was acquired (Acquisition Fees) or disposed of (Disposal Fees). It may include fees for surveyors, estate agents and solicitors. If the costs were shared, enter only the amount of that particular owner's share. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                            prfAmount:
                              description: The total amount of Private Residence Relief claimed. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                            otherReliefAmount:
                              description: The total amount of other reliefs claimed. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                            lossesFromThisYear:
                              description: The amount of Capital Gains Tax losses from other disposals in the current tax year that reduce the overall gain of this disposal. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                            lossesFromPreviousYear:
                              description: The amount of Capital Gains Tax losses from disposals in previous tax years that reduce the overall gain of this disposal. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                            amountOfNetGain:
                              description: The total amount of net gain from the disposal. Either gain or loss must be populated but not both. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                            amountOfNetLoss:
                              description: The total amount of net loss from the disposal. Either gain or loss must be populated but not both. The value must be between 0 and 99999999999.99 up to 2 decimal places.
                              type: number
                              multipleOf: 0.01
                              minimum: 0
                              maximum: 99999999999.99
                              example: '1999.99'
                          required:
                            - source
                            - ppdSubmissionId
                            - completionDate
                            - disposalProceeds
                            - acquisitionAmount
                  customerAddedDisposals:
                    type: object
                    description: Residential property disposals that weren't reported via the Report and pay Capital Gains Tax on UK property service and submitted by the customer into ITSA.
                    properties:
                      submittedOn:
                        description: The date the residential property disposals were submitted, in the format YYYY-MM-DDThh:mm:ss.SSSZ
                        type: string
                        example: '2020-07-07T10:59:47.544Z'
                      disposals:
                        type: array
                        description: An array of residential property disposals.
                        minItems: 1
                        items:
                          type: object
                          properties:
                            customerReference:
                              description: The unique reference for a residential property disposal supplied by the customer.
                              type: string
